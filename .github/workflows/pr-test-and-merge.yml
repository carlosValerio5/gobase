name: PR test and merge

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  test-changed-packages:
    name: Test changed packages
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Run tests for changed Go files
        run: bash scripts/test-changed-packages.sh "${{ github.event.pull_request.base.sha }}" "${{ github.event.pull_request.head.sha }}"

  merge:
    name: Merge PR
    runs-on: ubuntu-latest
    needs: test-changed-packages
    if: github.event.pull_request.head.repo.full_name == github.repository
    steps:
      - name: Merge pull request and delete branch
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr merge "${{ github.event.pull_request.number }}" \
            --merge \
            --delete-branch
